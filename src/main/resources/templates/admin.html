<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .form-error {
      color: #842029;
      background-color: #f8d7da;
      border: 1px solid #f5c2c7;
      border-radius: 4px;
      padding: 6px 10px;
      margin-top: 4px;
      font-size: 0.9rem;
    }
    .form-success {
      color: #0f5132;
      background-color: #d1e7dd;
      border: 1px solid #badbcc;
      border-radius: 4px;
      padding: 10px 15px;
      margin-top: 20px;
      font-size: 1rem;
    }
    .btn-tight { width:100%; height:38px; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Admin Dashboard</a>
      <form class="d-flex">
        <a class="btn btn-outline-light" href="/logout">Logout</a>
      </form>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>All Users</h2>
    <table class="table table-hover shadow-sm">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>New Password</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody"></tbody>
    </table>

    <hr/>
    <h3>Create New User</h3>

    <form id="createForm" class="row g-3">
      <div class="col-md-3">
        <input type="text" id="newUsername" class="form-control" placeholder="Username" required/>
        <div id="usernameError" class="form-error d-none"></div>
      </div>
      <div class="col-md-3">
        <input type="email" id="newEmail" class="form-control" placeholder="Email" required/>
        <div id="emailError" class="form-error d-none"></div>
      </div>
      <div class="col-md-2">
        <input type="password" id="newPassword" class="form-control" placeholder="Password" required/>
      </div>
      <div class="col-md-2">
        <select id="newRole" class="form-select">
          <option value="USER">USER</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </div>
      <div class="col-md-2 d-grid">
        <button type="submit" class="btn btn-success btn-tight">Create</button>
      </div>
    </form>

    <div id="createSuccess" class="form-success d-none">User created successfully.</div>
  </div>

  <script>
    const API = '';

    async function authFetch(path, opts = {}) {
      opts.credentials = 'include';
      opts.headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, opts);
      let data;
      try { data = await res.json(); } catch { data = {}; }
      if (!res.ok) {
        const errorMsg = data?.error || 'HTTP ' + res.status;
        throw new Error(errorMsg);
      }
      return data;
    }

    async function loadUsers() {
      try {
        const users = await authFetch('/users', { method: 'GET' });
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';
        users.forEach(u => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${u.id}</td>
            <td><input class="form-control form-control-sm edit-username" data-id="${u.id}" value="${u.username}"/></td>
            <td><input class="form-control form-control-sm edit-email" data-id="${u.id}" value="${u.email}"/></td>
            <td>
              <select class="form-select form-select-sm edit-role" data-id="${u.id}">
                <option value="USER" ${u.role==='USER' ? 'selected' : ''}>USER</option>
                <option value="ADMIN" ${u.role==='ADMIN' ? 'selected' : ''}>ADMIN</option>
              </select>
            </td>
            <td><input type="password" class="form-control form-control-sm edit-password" data-id="${u.id}" placeholder="••••••"/></td>
            <td>
              <button class="btn btn-sm btn-primary save-btn" data-id="${u.id}">Save</button>
              <button class="btn btn-sm btn-danger delete-btn" data-id="${u.id}">Delete</button>
            </td>`;
          tbody.appendChild(tr);
        });
        attachHandlers();
      } catch (e) {
        alert('Error loading users: ' + e);
      }
    }

    function attachHandlers() {
      document.querySelectorAll('.save-btn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.id;
          const username = document.querySelector(`.edit-username[data-id="${id}"]`).value;
          const email    = document.querySelector(`.edit-email[data-id="${id}"]`).value;
          const role     = document.querySelector(`.edit-role[data-id="${id}"]`).value;
          const pwdField = document.querySelector(`.edit-password[data-id="${id}"]`);
          const password = pwdField.value;
          const payload = { username, email, role };
          if (password) payload.password = password;
          try {
            await authFetch(`/users/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
            loadUsers();
          } catch (err) {
            alert('❌ Update failed: ' + err.message);
          }
        };
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = async () => {
          if (!confirm('Delete this user?')) return;
          try {
            await authFetch(`/users/${btn.dataset.id}`, { method: 'DELETE' });
            loadUsers();
          } catch (err) {
            alert('❌ Delete failed: ' + err.message);
          }
        };
      });
    }

    // Helper: hide all messages
    function clearMessages() {
      document.getElementById('usernameError').classList.add('d-none');
      document.getElementById('emailError').classList.add('d-none');
      document.getElementById('createSuccess').classList.add('d-none');
    }

    // Create form submit
    document.getElementById('createForm').onsubmit = async (e) => {
      e.preventDefault();
      clearMessages();

      const usernameField = document.getElementById('newUsername');
      const emailField    = document.getElementById('newEmail');
      const passwordField = document.getElementById('newPassword');
      const roleField     = document.getElementById('newRole');
      const usernameError = document.getElementById('usernameError');
      const emailError    = document.getElementById('emailError');
      const successBox    = document.getElementById('createSuccess');

      const username = usernameField.value.trim();
      const email    = emailField.value.trim();
      const payload  = {
        username,
        email,
        password: passwordField.value,
        role: roleField.value
      };

      try {
        // 1) Client-side pre-check so we can show BOTH errors at once
        const users = await authFetch('/users', { method: 'GET' });
        const usernameTaken = users.some(u => (u.username || '').toLowerCase() === username.toLowerCase());
        const emailTaken    = users.some(u => (u.email || '').toLowerCase()    === email.toLowerCase());

        if (usernameTaken || emailTaken) {
          if (usernameTaken) {
            usernameError.textContent = 'Username already exists.';
            usernameError.classList.remove('d-none');
          }
          if (emailTaken) {
            emailError.textContent = 'Email already in use.';
            emailError.classList.remove('d-none');
          }
          return; // don’t POST if conflicts detected
        }

        // 2) No conflicts → create
        await authFetch('/users', { method: 'POST', body: JSON.stringify(payload) });

        successBox.classList.remove('d-none');
        e.target.reset();
        loadUsers();
      } catch (err) {
        // Fallback: if server rejected for any reason, try to parse message and show what we can
        const msg = (err.message || '').toLowerCase();
        let shown = false;

        if (msg.includes('username')) {
          usernameError.textContent = 'Username already exists.';
          usernameError.classList.remove('d-none');
          shown = true;
        }
        if (msg.includes('email')) {
          emailError.textContent = 'Email already in use.';
          emailError.classList.remove('d-none');
          shown = true;
        }
        if (!shown) {
          emailError.textContent = 'Failed to create user.';
          emailError.classList.remove('d-none');
        }
      }
    };

    // initial load
    loadUsers();
  </script>
</body>
</html>
