<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .form-error {
      color: #842029;
      background-color: #f8d7da;
      border: 1px solid #f5c2c7;
      border-radius: 4px;
      padding: 6px 10px;
      margin-top: 4px;
      font-size: 0.9rem;
    }
    .form-success {
      color: #0f5132;
      background-color: #d1e7dd;
      border: 1px solid #badbcc;
      border-radius: 4px;
      padding: 10px 15px;
      margin-top: 12px;
      font-size: 1rem;
    }
    .btn-tight { width:100%; height:38px; }
    .gap-below { height: 42px; } /* reserves space under inputs so layout doesn't shift */
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Admin Dashboard</a>
      <form class="d-flex">
        <a class="btn btn-outline-light" href="/logout">Logout</a>
      </form>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>All Users</h2>
    <table class="table table-hover shadow-sm">
      <thead class="table-light">
        <tr>
          <th style="width:80px;">ID</th>
          <th>Username</th>
          <th>Email</th>
          <th style="width:140px;">Role</th>
          <th style="width:170px;">New Password</th>
          <th style="width:170px;">Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody"></tbody>
    </table>

    <hr/>
    <h3 id="formTitle">Create New User</h3>

    <form id="createForm" class="row g-3">
      <div class="col-md-3">
        <input type="text" id="newUsername" class="form-control" placeholder="Username" required/>
        <div id="usernameError" class="form-error d-none"></div>
      </div>
      <div class="col-md-3">
        <input type="email" id="newEmail" class="form-control" placeholder="Email" required/>
        <div id="emailError" class="form-error d-none"></div>
      </div>
      <div class="col-md-2">
        <input type="password" id="newPassword" class="form-control" placeholder="Password" />
      </div>
      <div class="col-md-2">
        <select id="newRole" class="form-select">
          <option value="USER">USER</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </div>
      <div class="col-md-2 d-grid">
        <button type="submit" id="submitBtn" class="btn btn-success btn-tight">Create</button>
      </div>

      <!-- keep layout stable so messages don't shift the grid -->
      <div class="col-12 gap-below"></div>

      <!-- success box sits under the inputs, same place as errors -->
      <div class="col-12">
        <div id="createSuccess" class="form-success d-none">User created successfully.</div>
      </div>

      <!-- hidden while creating; visible while editing -->
      <div class="col-12 d-flex gap-2">
        <button type="button" id="cancelEdit" class="btn btn-outline-secondary d-none">Cancel edit</button>
      </div>
    </form>
  </div>

  <script>
    const API = '';
    let editMode = false;
    let editId = null;

    async function authFetch(path, opts = {}) {
      opts.credentials = 'include';
      opts.headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, opts);
      let data;
      try { data = await res.json(); } catch { data = {}; }
      if (!res.ok) {
        const errorMsg = data?.error || 'HTTP ' + res.status;
        const err = new Error(errorMsg);
        err.status = res.status;
        err.payload = data;
        throw err;
      }
      return data;
    }

    function clearMessages() {
      document.getElementById('usernameError').classList.add('d-none');
      document.getElementById('emailError').classList.add('d-none');
      document.getElementById('createSuccess').classList.add('d-none');
    }

    function setCreateMode() {
      editMode = false;
      editId = null;
      document.getElementById('formTitle').textContent = 'Create New User';
      document.getElementById('submitBtn').textContent = 'Create';
      document.getElementById('submitBtn').classList.remove('btn-primary');
      document.getElementById('submitBtn').classList.add('btn-success');
      document.getElementById('cancelEdit').classList.add('d-none');
      clearMessages();
      document.getElementById('createSuccess').textContent = 'User created successfully.';
      // In create mode, password is required
      document.getElementById('newPassword').required = true;
      // reset fields
      document.getElementById('newUsername').value = '';
      document.getElementById('newEmail').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newRole').value = 'USER';
    }

    function setEditMode(user) {
      editMode = true;
      editId = user.id;
      document.getElementById('formTitle').textContent = `Edit User #${user.id}`;
      document.getElementById('submitBtn').textContent = 'Update';
      document.getElementById('submitBtn').classList.remove('btn-success');
      document.getElementById('submitBtn').classList.add('btn-primary');
      document.getElementById('cancelEdit').classList.remove('d-none');
      clearMessages();
      document.getElementById('createSuccess').textContent = 'User updated successfully.';
      // In edit mode, password is optional
      document.getElementById('newPassword').required = false;

      // fill the form
      document.getElementById('newUsername').value = user.username || '';
      document.getElementById('newEmail').value = user.email || '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newRole').value = user.role || 'USER';
    }

    async function loadUsers() {
      try {
        const users = await authFetch('/users', { method: 'GET' });
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';
        users.forEach(u => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${u.id}</td>
            <td>${escapeHtml(u.username ?? '')}</td>
            <td>${escapeHtml(u.email ?? '')}</td>
            <td>${escapeHtml(u.role ?? '')}</td>
            <td>
              <span class="text-muted">••••••</span>
            </td>
            <td class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-primary edit-btn" data-id="${u.id}">Edit in form</button>
              <button class="btn btn-sm btn-danger delete-btn" data-id="${u.id}">Delete</button>
            </td>`;
          tbody.appendChild(tr);
        });
        attachHandlers(users);
      } catch (e) {
        alert('Error loading users: ' + e);
      }
    }

    function attachHandlers(users) {
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.onclick = () => {
          const id = Number(btn.dataset.id);
          const user = users.find(x => x.id === id);
          if (user) setEditMode(user);
        };
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = async () => {
          if (!confirm('Delete this user?')) return;
          try {
            await authFetch(`/users/${btn.dataset.id}`, { method: 'DELETE' });
            if (editMode && Number(btn.dataset.id) === editId) setCreateMode();
            loadUsers();
          } catch (err) {
            alert('❌ Delete failed: ' + err.message);
          }
        };
      });

      document.getElementById('cancelEdit').onclick = () => setCreateMode();
    }

    // Escape helper for safe interpolation
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[m]));
    }

    // Create/Update handler (unified)
    document.getElementById('createForm').onsubmit = async (e) => {
      e.preventDefault();
      clearMessages();

      const usernameField = document.getElementById('newUsername');
      const emailField    = document.getElementById('newEmail');
      const passwordField = document.getElementById('newPassword');
      const roleField     = document.getElementById('newRole');
      const usernameError = document.getElementById('usernameError');
      const emailError    = document.getElementById('emailError');
      const successBox    = document.getElementById('createSuccess');

      const username = usernameField.value.trim();
      const email    = emailField.value.trim();
      const password = passwordField.value;
      const role     = roleField.value;

      // Client-side duplicate check to show BOTH boxes if needed
      try {
        const users = await authFetch('/users', { method: 'GET' });
        const usernameTaken = users.some(u =>
          (u.username || '').toLowerCase() === username.toLowerCase() &&
          (!editMode || u.id !== editId)
        );
        const emailTaken = users.some(u =>
          (u.email || '').toLowerCase() === email.toLowerCase() &&
          (!editMode || u.id !== editId)
        );

        if (usernameTaken || emailTaken) {
          if (usernameTaken) {
            usernameError.textContent = 'Username already exists.';
            usernameError.classList.remove('d-none');
          }
          if (emailTaken) {
            emailError.textContent = 'Email already in use.';
            emailError.classList.remove('d-none');
          }
          return;
        }

        if (!editMode) {
          // CREATE
          const payload = { username, email, password, role };
          await authFetch('/users', { method: 'POST', body: JSON.stringify(payload) });
          successBox.textContent = 'User created successfully.';
          successBox.classList.remove('d-none');
          setCreateMode(); // resets form to blank create
        } else {
          // UPDATE
          const payload = { username, email, role };
          if (password && password.trim() !== '') payload.password = password;
          await authFetch(`/users/${editId}`, { method: 'PUT', body: JSON.stringify(payload) });
          successBox.textContent = 'User updated successfully.';
          successBox.classList.remove('d-none');
          setCreateMode();
        }
        loadUsers();
      } catch (err) {
        // Fallback server-side parse
        const msg = (err.message || '').toLowerCase();
        let shown = false;
        if (msg.includes('username')) {
          usernameError.textContent = 'Username already exists.';
          usernameError.classList.remove('d-none');
          shown = true;
        }
        if (msg.includes('email')) {
          emailError.textContent = 'Email already in use.';
          emailError.classList.remove('d-none');
          shown = true;
        }
        if (!shown) {
          emailError.textContent = 'Failed to save user.';
          emailError.classList.remove('d-none');
        }
      }
    };

    // initial
    setCreateMode();
    loadUsers();
  </script>
</body>
</html>
