<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    /* same visual language as admin.html */
    .msg {
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.95rem;
      margin: 0; /* the slot handles spacing */
      border: 1px solid transparent;
    }
    .msg-error {
      color: #842029;
      background-color: #f8d7da;
      border-color: #f5c2c7;
    }
    .msg-success {
      color: #0f5132;
      background-color: #d1e7dd;
      border-color: #badbcc;
    }

    /* Reserve space so layout does not shift when message appears */
    .feedback-slot {
      min-height: 42px;      /* ≈ one line message box */
      margin-top: 6px;       /* tight spacing under the input */
      margin-bottom: 12px;   /* this creates the “gap” above the Save button */
      display: flex;
      align-items: center;   /* vertically center the message if it’s shorter */
    }

    .btn-wide {
      width: 100%;
      height: 40px;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">User Dashboard</a>
      <form class="d-flex">
        <a class="btn btn-outline-light" href="/logout">Logout</a>
      </form>
    </div>
  </nav>

  <div class="container my-4">
    <h3 class="mb-1">Welcome, user!</h3>
    <div class="text-muted mb-4">Your role: USER</div>

    <section class="border-top pt-3">
      <h5>Your Profile</h5>

      <form id="profileForm" class="row g-3">
        <!-- Email -->
        <div class="col-md-6">
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" class="form-control" placeholder="you@example.com" required/>
          <!-- Single message slot: shows red errors or green success at the same place -->
          <div class="feedback-slot">
            <div id="emailMsg" class="msg d-none"></div>
          </div>
        </div>

        <!-- New password -->
        <div class="col-md-6">
          <label for="password" class="form-label">New Password</label>
          <input id="password" type="password" class="form-control" placeholder="Leave blank to keep unchanged"/>
          <!-- keep column heights consistent -->
          <div class="feedback-slot"></div>
        </div>

        <!-- Save button spans full width -->
        <div class="col-12">
          <button type="submit" class="btn btn-success btn-wide">Save Changes</button>
        </div>
      </form>
    </section>
  </div>

  <script>
    const API = '';

    async function authFetch(path, opts = {}) {
      opts.credentials = 'include';
      opts.headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, opts);
      let data = {};
      try { data = await res.json(); } catch {}
      if (!res.ok) {
        const msg = (data && data.error) ? data.error : ('HTTP ' + res.status);
        throw new Error(msg);
      }
      return data;
    }

    function showMsg(text, kind) {
      const box = document.getElementById('emailMsg');
      box.textContent = text;
      box.classList.remove('d-none', 'msg-error', 'msg-success');
      box.classList.add(kind === 'success' ? 'msg-success' : 'msg-error', 'msg');
    }
    function clearMsg() {
      const box = document.getElementById('emailMsg');
      box.textContent = '';
      box.classList.add('d-none');
      box.classList.remove('msg-error', 'msg-success');
    }

    // Load current profile email to seed the field (optional; safe if endpoint exists)
    (async () => {
      try {
        const me = await authFetch('/users/me', { method: 'GET' });
        if (me && me.email) document.getElementById('email').value = me.email;
      } catch { /* non-fatal */ }
    })();

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMsg();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        await authFetch('/users/me', {
          method: 'PUT',
          body: JSON.stringify({
            email,
            ...(password ? { password } : {})
          })
        });

        // success -> show green box in the same slot and clear password field
        showMsg('Profile updated successfully.', 'success');
        document.getElementById('password').value = '';
      } catch (err) {
        const msg = (err.message || '').toLowerCase();
        if (msg.includes('email')) {
          showMsg('Email already in use.', 'error');
        } else {
          showMsg('Failed to update profile.', 'error');
        }
      }
    });
  </script>
</body>
</html>
