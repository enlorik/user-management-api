<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard – User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .form-error{
      color:#842029;background:#f8d7da;border:1px solid #f5c2c7;border-radius:4px;
      padding:6px 10px;font-size:.9rem
    }
    .form-success{
      color:#0f5132;background:#d1e7dd;border:1px solid #badbcc;border-radius:4px;
      padding:10px 15px;font-size:1rem;margin-top:20px
    }
    /* keep layout stable: each slot always takes error-box height */
    .msg-slot{min-height:36px;margin-top:6px}
    .btn-tight{width:100%;height:38px;margin-top:10px}
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">User Dashboard</a>
      <form class="d-flex"><a class="btn btn-outline-light" href="/logout">Logout</a></form>
    </div>
  </nav>

  <!-- expose current user to JS -->
  <div id="me"
       th:data-username="${username}"
       th:data-email="${email}"
       style="display:none"></div>

  <div class="container mt-4">
    <h2 th:text="'Welcome, ' + ${username} + '!'">Welcome, user!</h2>
    <p>Your role: USER</p>

    <hr/>
    <h4>Your Profile</h4>

    <form id="profileForm" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" th:value="${email}" required/>
        <div class="msg-slot"><div id="emailError" class="form-error d-none"></div></div>
      </div>
      <div class="col-md-6">
        <label class="form-label">New Password</label>
        <input type="password" id="password" class="form-control" placeholder="Leave blank to keep unchanged"/>
        <div class="msg-slot"><div id="passwordError" class="form-error d-none"></div></div>
      </div>
      <div class="col-md-12">
        <button type="submit" class="btn btn-success btn-tight">Save Changes</button>
      </div>
    </form>

    <div id="profileSuccess" class="form-success d-none">Profile updated successfully.</div>
  </div>

  <script>
    const API = '';

    async function authFetch(path, opts = {}) {
      opts.credentials = 'include';
      opts.headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, opts);
      let data; try { data = await res.json(); } catch { data = {}; }
      if (!res.ok) throw new Error(data?.error || ('HTTP ' + res.status));
      return data;
    }

    function clearMessages() {
      ['emailError','passwordError','profileSuccess'].forEach(id=>{
        document.getElementById(id).classList.add('d-none');
        if(id.endsWith('Error')) document.getElementById(id).textContent='';
      });
    }

    document.getElementById('profileForm').onsubmit = async (e) => {
      e.preventDefault();
      clearMessages();

      const me     = document.getElementById('me').dataset;
      const myUser = (me.username || '').toLowerCase();
      const emailF = document.getElementById('email');
      const passF  = document.getElementById('password');
      const email  = emailF.value.trim();
      const pass   = passF.value.trim();

      const emailErr = document.getElementById('emailError');
      const passErr  = document.getElementById('passwordError');
      const okBox    = document.getElementById('profileSuccess');

      // client-side precheck so we can show the specific message
      try {
        const users = await authFetch('/users', { method:'GET' });
        const taken = users.some(u =>
          (u.email || '').toLowerCase() === email.toLowerCase() &&
          (u.username || '').toLowerCase() !== myUser
        );
        if (taken) {
          emailErr.textContent = 'Email already in use.';
          emailErr.classList.remove('d-none');
          return;
        }
      } catch { /* if listing fails, continue and let server decide */ }

      // build payload
      const payload = { email };
      if (pass) payload.password = pass;

      try {
        await authFetch('/users/me', { method:'PUT', body: JSON.stringify(payload) });
        okBox.classList.remove('d-none');
        passF.value = '';
      } catch (err) {
        const msg = ('' + err.message).toLowerCase();
        if (msg.includes('email')) {
          emailErr.textContent = 'Email already in use.';
          emailErr.classList.remove('d-none');
        } else if (msg.includes('password')) {
          passErr.textContent = 'Invalid password.';
          passErr.classList.remove('d-none');
        } else {
          emailErr.textContent = 'Failed to update profile.';
          emailErr.classList.remove('d-none');
        }
      }
    };
  </script>
</body>
</html>
